name: Build Android APK (No Firebase)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Environment Files
        run: |
          echo 'GEMINI_API_KEY=placeholder_key' > .env.example
          echo 'GEMINI_API_KEY=placeholder_key' > .env

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Wrapper Executable
        run: chmod +x gradlew

      - name: Create Required Directories and Files
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          
          # Create strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Puppet Studio</string>
          </resources>
          EOF
          
          # Create styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.PuppetStudio" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:statusBarColor">@android:color/transparent</item>
              </style>
          </resources>
          EOF
          
          # Create network_security_config.xml
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">generativelanguage.googleapis.com</domain>
                  <domain includeSubdomains="true">firebaseio.com</domain>
              </domain-config>
          </network-security-config>
          EOF
          
          # Create file_paths.xml
          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external" path="." />
              <cache-path name="cache" path="." />
          </paths>
          EOF

      - name: Disable Firebase
        run: |
          sed -i '/com.google.gms.google-services/d' app/build.gradle.kts
          sed -i '/com.google.firebase/d' app/build.gradle.kts
          sed -i '/google-services/d' build.gradle.kts || true
          sed -i '/firebase/d' build.gradle.kts || true

      - name: Remove Custom Debug Signing
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
